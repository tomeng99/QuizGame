name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev

env:
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/quizgame-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/quizgame-client
  DEPLOY_HOST: ${{ github.ref_name == 'main' && secrets.PROD_VPS_HOST || secrets.DEV_VPS_HOST }}
  DEPLOY_USER: ${{ github.ref_name == 'main' && secrets.PROD_VPS_USER || secrets.DEV_VPS_USER }}
  DEPLOY_KEY: ${{ github.ref_name == 'main' && secrets.PROD_VPS_SSH_KEY || secrets.DEV_VPS_SSH_KEY }}
  DEPLOY_PORT: ${{ github.ref_name == 'main' && secrets.PROD_VPS_PORT || secrets.DEV_VPS_PORT }}
  DEPLOY_DIR: ${{ github.ref_name == 'main' && secrets.PROD_APP_DIR || secrets.DEV_APP_DIR }}
  WEB_HTTP_PORT: ${{ github.ref_name == 'main' && secrets.PROD_WEB_HTTP_PORT || secrets.DEV_WEB_HTTP_PORT }}
  ALLOWED_ORIGINS: ${{ github.ref_name == 'main' && secrets.PROD_ALLOWED_ORIGINS || secrets.DEV_ALLOWED_ORIGINS }}
  EXPO_PUBLIC_API_URL: ${{ github.ref_name == 'main' && secrets.PROD_EXPO_PUBLIC_API_URL || secrets.DEV_EXPO_PUBLIC_API_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image-tag
        run: echo "value=${GITHUB_REF_NAME}-latest" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/client/Dockerfile
          push: true
          tags: |
            ${{ env.CLIENT_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
          build-args: |
            EXPO_PUBLIC_API_URL=${{ env.EXPO_PUBLIC_API_URL }}

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          port: ${{ env.DEPLOY_PORT || '22' }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_DIR }}"
            cat > "${{ env.DEPLOY_DIR }}/.env" <<EOF
            SERVER_IMAGE=${{ env.SERVER_IMAGE }}
            CLIENT_IMAGE=${{ env.CLIENT_IMAGE }}
            IMAGE_TAG=${{ steps.image-tag.outputs.value }}
            WEB_HTTP_PORT=${{ env.WEB_HTTP_PORT }}
            ALLOWED_ORIGINS=${{ env.ALLOWED_ORIGINS }}
            EOF
            cd "${{ env.DEPLOY_DIR }}"
            echo '${{ secrets.GHCR_PAT }}' | podman login ghcr.io -u '${{ secrets.GHCR_USER }}' --password-stdin
            podman compose pull
            podman compose down
            podman compose up -d
            podman image prune -af
